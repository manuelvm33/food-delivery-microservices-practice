<header class="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">

            <div class="flex-shrink-0 flex items-center cursor-pointer">
                <span class="text-3xl font-extrabold tracking-tighter text-orange-500">
                    Dropp<span class="text-white">.</span>
                </span>
            </div>

            <div class="flex items-center space-x-4">
                <div class="hidden sm:block text-right">
                    <p class="text-sm font-medium text-gray-200">Hello, {{ username() }}</p>
                    <p class="text-xs text-orange-400 font-semibold">My Profile</p>
                </div>

                <button
                    class="flex items-center justify-center w-10 h-10 rounded-full bg-orange-500 text-gray-900 hover:bg-orange-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-orange-500 transition-colors duration-200 shadow-inner"
                    aria-label="User Menu">
                    <img src="user.svg" alt="user" srcset="" class="w-6 h-6">
                </button>
            </div>

        </div>
    </div>
</header>
