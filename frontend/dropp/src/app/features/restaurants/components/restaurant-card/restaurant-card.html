<div class="bg-neutral-primary-soft flex flex-col border border-default rounded-base shadow-xs overflow-hidden">
    <a href="#">
        <img class="w-full h-60 object-cover rounded-t-base" [src]="restaurant.imageUrl"
            [alt]="restaurant.name + ' restaurant'" />
    </a>

    <div class="flex flex-col flex-1 gap-3 p-5 text-center">
        <h3 class="text-2xl font-semibold tracking-tight text-heading">{{ restaurant.name }}</h3>

        <p class="font-normal text-fg-secondary flex-1">{{ restaurant.restaurantDescription }}</p>

        <div class="flex items-center justify-center gap-1 bg-amber-50 text-amber-600 border border-amber-200 text-xs font-semibold px-2.5 py-1 rounded-full self-center shadow-sm">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
            </svg>
            {{ restaurant.rating }}
        </div>

        <button type="button"
            class="mt-3 text-white bg-color-dropp-orange hover:bg-orange-500 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 focus:ring-4 focus:outline-none focus:ring-orange-300 active:scale-95 border border-transparent font-medium rounded-lg text-sm px-5 py-2.5 text-center inline-flex items-center justify-center"
            (click)="order(restaurant.id!)">
            Order Now
        </button>
    </div>
</div>
