<div class="bg-neutral-primary-soft flex flex-col border border-default rounded-base shadow-xs overflow-hidden">
    <a href="#">
        <img class="w-full h-60 object-cover rounded-t-base" [src]="restaurant.imageUrl"
            [alt]="restaurant.name + ' restaurant'" />
    </a>

    <div class="flex flex-col flex-1 gap-3 p-5 text-center">
        <span
            class="inline-flex items-center self-center bg-brand-softer border border-brand-subtle text-fg-brand-strong text-xs font-medium px-1.5 py-0.5 rounded-sm">
            <svg class="w-3 h-3 me-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18.122 17.645a7.185 7.185 0 0 1-2.656 2.495 7.06 7.06 0 0 1-3.52.853 6.617 6.617 0 0 1-3.306-.718 6.73 6.73 0 0 1-2.54-2.266c-2.672-4.57.287-8.846.887-9.668A4.448 4.448 0 0 0 8.07 6.31 4.49 4.49 0 0 0 7.997 4c1.284.965 6.43 3.258 5.525 10.631 1.496-1.136 2.7-3.046 2.846-6.216 1.43 1.061 3.985 5.462 1.754 9.23Z" />
            </svg>
            Trending
        </span>

        <h3 class="text-2xl font-semibold tracking-tight text-heading">{{ restaurant.name }}</h3>

        <p class="font-normal text-fg-secondary flex-1">{{ restaurant.restaurantDescription }}</p>

        <span
            class="inline-flex items-center self-center bg-brand-softer border border-brand-subtle text-fg-brand-strong text-xs font-medium px-1.5 py-0.5 rounded-sm">
            <svg class="w-4 h-4 text-black-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
                height="24" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M13.849 4.22c-.684-1.626-3.014-1.626-3.698 0L8.397 8.387l-4.552.361c-1.775.14-2.495 2.331-1.142 3.477l3.468 2.937-1.06 4.392c-.413 1.713 1.472 3.067 2.992 2.149L12 19.35l3.897 2.354c1.52.918 3.405-.436 2.992-2.15l-1.06-4.39 3.468-2.938c1.353-1.146.633-3.336-1.142-3.477l-4.552-.36-1.754-4.17Z" />
            </svg>

            {{ restaurant.rating }}
        </span>

        <button type="button"
            class="mt-2 text-white bg-[#FF9119] hover:bg-[#FF9119]/80 focus:ring-4 focus:outline-none focus:ring-[#FF9119]/50 box-border border border-transparent shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 text-center inline-flex items-center justify-center dark:hover:bg-[#FF9119]/80 dark:focus:ring-[#FF9119]/40"
            (click)="order(restaurant.id!)">
            Order Now
        </button>
    </div>
</div>
