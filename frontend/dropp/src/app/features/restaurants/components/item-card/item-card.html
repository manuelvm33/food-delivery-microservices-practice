<article class="flex items-center gap-4 bg-white rounded-xl border border-stone-100 shadow-sm
         hover:shadow-md hover:border-stone-200 transition-all duration-200 px-4 py-3">
  <div class="shrink-0 flex items-center justify-center w-14 h-14 rounded-full
              bg-gradient-to-br from-amber-50 to-orange-100" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-orange-400" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 13h18" />
      <path d="M12 3a9 9 0 0 1 9 9H3a9 9 0 0 1 9-9z" />
      <path d="M8 21h8" />
      <path d="M12 13v8" />
    </svg>
  </div>

  <div class="flex-1 min-w-0">

    <div class="flex items-center gap-2 flex-wrap">
      <h3 class="text-base font-bold text-stone-900 leading-tight flex-1 min-w-0 truncate">
        {{ foodItem.name }}
      </h3>
      @if (foodItem.vegan) {
      <span class="shrink-0 text-[10px] font-semibold uppercase tracking-wide
                     bg-green-100 text-green-700 px-2 py-0.5 rounded-full">
        🌿 Vegan
      </span>
      }
    </div>

    @if (foodItem.description) {
    <p class="item-desc mt-0.5 text-xs text-stone-400 leading-relaxed">
      {{ foodItem.description }}
    </p>
    }

  </div>

  <div class="shrink-0 flex flex-col items-end gap-2">

    <span class="text-base font-extrabold text-orange-500">
      {{ foodItem.price | currency:'USD':'symbol':'1.2-2' }}
    </span>

    <div class="flex items-center gap-1.5">
      <button type="button" (click)="decrement()" [attr.aria-label]="'Decrease quantity of ' + foodItem.name" class="w-7 h-7 rounded-full flex items-center justify-center font-bold text-sm
               transition-all duration-150 active:scale-90" [class]="quantity === 0
          ? 'bg-stone-100 text-stone-400 cursor-not-allowed'
          : 'bg-orange-500 text-white hover:bg-orange-600 cursor-pointer'" [disabled]="quantity === 0">−</button>

      <span class="w-5 text-center text-sm font-bold transition-colors duration-200"
        [class]="quantity > 0 ? 'text-orange-500' : 'text-stone-400'">
        {{ quantity }}
      </span>

      <button type="button" (click)="increment()" [attr.aria-label]="'Add ' + foodItem.name + ' to cart'" class="w-7 h-7 rounded-full bg-orange-500 hover:bg-orange-600 text-white
               flex items-center justify-center font-bold text-sm cursor-pointer
               transition-all duration-150 hover:scale-110 active:scale-90">+</button>
    </div>

  </div>

</article>
